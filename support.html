<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support - Vidmo AI</title>

<style>
    body {
        margin: 0;
        background: #17181A;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
    }

    h1 {
        font-size: 28px;
        margin-bottom: 10px;
    }

    h2 {
        font-size: 18px;
        margin-top: 25px;
        margin-bottom: 10px;
    }

    p {
        color: #EDEDED;
        font-size: 15px;
    }

    .brand {
        color: #E7FC57;
        font-weight: 600;
    }

    .highlight {
        color: #E7FC57;
    }

    .card {
        background: #1F2023;
        border-radius: 12px;
        padding: 18px;
        margin-top: 15px;
    }

    .btn {
        display: inline-block;
        margin-top: 10px;
        padding: 12px;
        width: 100%;
        background: #E7FC57;
        color: #000;
        border-radius: 8px;
        border: none;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
    }

    .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    input, textarea {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border-radius: 8px;
        border: none;
        outline: none;
        background: #2A2B2F;
        color: #fff;
        font-size: 14px;
    }

    textarea {
        resize: none;
        height: 120px;
    }

    .error {
        color: #ff6b6b;
        font-size: 13px;
        margin-top: 5px;
    }

    .success {
        color: #E7FC57;
        margin-top: 10px;
        font-size: 14px;
    }

</style>
</head>

<body>

<div class="container">

    <h1>Support for <span class="brand">Vidmo</span> AI</h1>
    <p>Need help? Send us a message and we’ll get back to you.</p>

    <!-- Contact Form -->
    <div class="card">
        <h2>Contact Support</h2>

        <input type="email" id="email" placeholder="Enter your email">
        <textarea id="message" placeholder="Write your message..."></textarea>

        <div id="error" class="error"></div>
        <div id="success" class="success"></div>

        <button class="btn" onclick="sendMessage()">Send Message</button>
    </div>

    <!-- FAQ -->
    <div class="card">
        <h2>Common Issues</h2>

        <p><strong>Video not generating?</strong><br>Check your internet and try again.</p>
        <p><strong>Slow processing?</strong><br>AI generation depends on server load.</p>
        <p><strong>App not working?</strong><br>Restart or update the app.</p>
    </div>

    <div style="margin-top:30px; color:#888; font-size:14px;">
        © 2026 <span class="brand">Vidmo</span> AI
    </div>

</div>

<script>
function sendMessage() {
    const email = document.getElementById("email").value.trim();
    const message = document.getElementById("message").value.trim();
    const error = document.getElementById("error");
    const success = document.getElementById("success");

    error.textContent = "";
    success.textContent = "";

    // Validation
    if (!email || !message) {
        error.textContent = "Please fill in all fields.";
        return;
    }

    // Simple email check
    if (!email.includes("@")) {
        error.textContent = "Please enter a valid email.";
        return;
    }

    // Success message (no backend)
    success.textContent = "Message sent successfully!";
    
    // Clear fields
    document.getElementById("email").value = "";
    document.getElementById("message").value = "";
}
</script>

</body>
</html>
